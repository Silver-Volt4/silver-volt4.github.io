<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generátor Armor Stand textů</title>
</head>

<body>
    <iframe src="https://minecraft.tools/en/json_text.php"></iframe>
    <div>
        Vlož sem JSON textovou komponentu:
        <input id="input">
        <div id="output">
        </div>
    </div>
</body>

<style>
    * {
        font-size: 5vmin;
        font-family: sans-serif;
    }

    body {
        overflow-x: hidden;
        margin: 0;
    }

    iframe {
        width: 100%;
        height: 75vh;
    }

    body>div {
        display: flex;
        flex-direction: column;
        margin: 32px;
    }

    #output {
        background-color: gray;
    }
</style>

<script>
    function textChanged() {
        var json = "";
        try {
            json = JSON.parse(document.getElementById("input").value);
            var parsed =
                JSON.stringify(
                    [JSON.stringify(json)]
                );
            parsed = parsed.substr(1,parsed.length-2);
            var mccommand = "/summon armor_stand ~ ~ ~ {CustomName:" + parsed + ",CustomNameVisible:1b,Marker:1b,Invisible:1b}";
            document.getElementById("output").innerText = mccommand;
        } catch {
            document.getElementById("output").innerText = "";
        }
    }
    document.getElementById("input").addEventListener("input", textChanged);
</script>

</html>
